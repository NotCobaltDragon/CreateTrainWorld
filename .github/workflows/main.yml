name: Export Modpack

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Read version from pack.toml
        id: version
        run: |
          VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' pack.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Export modpack
        run: packwiz modrinth export -o "createtrainworld-${{ steps.version.outputs.version }}.mrpack"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: createtrainworld-${{ steps.version.outputs.version }}
          path: createtrainworld-*.mrpack
